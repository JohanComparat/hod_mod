[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hod_mod"
version = "0.0.3"
description = "HOD galaxy clustering and weak lensing prediction and fitting"
authors = [{name = "Johan Comparat", email = "johan.comparat@pm.me"}]
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
    "astropy",
    "matplotlib",
    "camb",
    "colossus",
    "emcee",
    "h5py",
    "pandas",
    "pyyaml",
    "tqdm",
    "jax",
    "jaxlib",
    "AletheiaCosmo",
    "classy",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-cov", "sphinx", "sphinx-rtd-theme", "numpydoc"]

[tool.setuptools.packages.find]
where = ["."]
include = ["hod_mod*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
omit = ["*/hod_mod/scripts/*"]

[tool.coverage.report]
omit = ["*/hod_mod/scripts/*"]
