# Benchmark: Zu & Mandelbaum 2015 DeltaSigma-only fit, SDSS DR7
# Paper: Zu & Mandelbaum 2015, MNRAS 454, 1161 (arXiv:1505.02781)
# Data: SDSS DR7, 10.2 < log10(M_*/h^-2 Msun) < 10.6 bin (iHOD sample)
#       pi_max = 60 h^-1 Mpc, rp_max = 20 h^-1 Mpc.
#       Lensing from Mandelbaum et al. 2006 (arXiv:astro-ph/0511164).
#       Data is in Figure 6 of Zu & Mandelbaum 2015 — needs digitization.
# STATUS: data file NEEDS DIGITIZATION from Figure 6

ds:
  file:    data/zumandelbaum2015_sdss/ds_thresh_mstar102.csv
  rp_min:  0.05
  rp_max:  20.0
  ng_obs:     2.7e-3
  ng_frac_err: 0.20

cosmology:
  Omega_m: 0.26
  h:       0.72
  sigma8:  0.77
  n_s:     0.96
  Omega_b: 0.044

model:
  hod_model:   ZuMandelbaum15HODModel
  hmf_backend: tinker08
  z:           0.07
  pi_max:      60.0

parameters:
  lg_m1h:        {free: true,  bounds: [11.0, 14.0], init: 12.10}
  lg_m0star:     {free: true,  bounds: [9.0, 12.0],  init: 10.31}
  beta:          {free: true,  bounds: [0.1, 1.0],   init: 0.33}
  delta:         {free: true,  bounds: [0.1, 2.0],   init: 0.42}
  gamma:         {free: true,  bounds: [0.5, 3.0],   init: 1.21}
  sigma_lnmstar: {free: true,  bounds: [0.1, 1.5],   init: 0.50}
  eta:           {free: true,  bounds: [-0.5, 0.5],  init: -0.04}
  fc:            {free: true,  bounds: [0.3, 1.0],   init: 0.86}
  bsat:          {free: true,  bounds: [1.0, 20.0],  init: 8.98}
  log10m_star_thresh: {free: false, init: 10.2}
  beta_sat:      {free: false, init: 0.90}
  bcut:          {free: false, init: 0.86}
  beta_cut:      {free: false, init: 0.41}
  alpha_sat:     {free: false, init: 1.00}

fitting:
  method:    map
  n_walkers: 32
  n_steps:   2000
  n_burnin:  500

output:
  dir: results/benchmarks/zumandelbaum2015_ds/
