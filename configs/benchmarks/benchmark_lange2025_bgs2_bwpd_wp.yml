# DESI DR1 BGS2 wp-only benchmark — manually digitized data (Lange+2025, arXiv:2512.15962)
# Data: wp_bgs2_bwpd.csv — manually digitized via WebPlotDigitizer from Fig 3
# Format: rp_hMpc, rp*wp [(Mpc/h)^2], upper_rp*wp [(Mpc/h)^2]; err = upper - value
# DES ESD is excluded from this benchmark.

data:
  file:   data/lange2025_desi_dr1/BGS2/wp_bgs2_bwpd.csv
  format: bwpd
  rp_min: 0.4
  rp_max: 63.0

cosmology:
  Omega_m: 0.3153
  h:       0.6736
  sigma8:  0.8111
  n_s:     0.9649
  Omega_b: 0.0493

model:
  hod_model:   Lange25HODModel
  hmf_backend: tinker08
  z:           0.25
  pi_max:      80.0

parameters:
  log10mmin:  {free: true,  bounds: [11.0, 15.0], init: 12.0}
  sigma_logm: {free: true,  bounds: [0.1,  1.0],  init: 0.4}
  log10m0:    {free: true,  bounds: [11.0, 15.0], init: 12.5}
  log10m1:    {free: true,  bounds: [11.0, 15.0], init: 13.5}
  alpha:      {free: true,  bounds: [0.5,  2.0],  init: 1.0}
  f_Gamma:    {free: true,  bounds: [0.5,  1.0],  init: 1.0}
  A_cen:      {free: true,  bounds: [-1.0, 1.0],  init: 0.0}
  A_sat:      {free: true,  bounds: [-1.0, 1.0],  init: 0.0}
  Omega_m:
    free:        true
    bounds:      [0.279, 0.352]
    init:        0.3153
    prior_type:  gaussian
    prior_mean:  0.3153
    prior_sigma: 0.0073
  S8:
    free:        true
    bounds:      [0.775, 0.889]
    init:        0.832
    prior_type:  gaussian
    prior_mean:  0.832
    prior_sigma: 0.0114

fitting:
  method:         map
  n_walkers:      64
  n_steps:        4000
  n_burnin:       1000
  use_free_cosmo: true

output:
  dir: results/benchmarks/lange2025/bgs2_bwpd_wp/
