# Benchmark: More+2015 BOSS CMASS subsample A — logM*>11.1 joint wp+ESD, FREE COSMOLOGY
# Paper: More et al. 2015, arXiv:1407.1856
#
# This config reproduces the full cosmological analysis of More+2015:
#   - Omega_m and S8 fitted freely (no prior; paper Table 3 result: Omega_m=0.310+0.019-0.020,
#     sigma_8=0.785+0.044-0.041)
#   - h fitted with WMAP9-E Gaussian prior  (mu=0.703, sigma=0.018)
#   - n_s, Omega_b fixed at WMAP9 best-fit (well-constrained, negligible effect on result)
#   - 5 HOD params free; off-centering and incompleteness fixed at published MAP values
#
# Total free parameters: 5 (HOD) + 2 (Omega_m, S8) + 1 (h) = 8
# Data: 27 wp + 14 ESD + 1 ng = 42 points → ndof ≈ 34
#
# The use_free_cosmo: true flag activates the _CachedPkLinear path for efficient
# P(k) evaluation at each new (Omega_m, S8, h) during MCMC.

data:
  file:   data/more2015_boss_cmass/logM11_12/wp_logM11_12.csv
  format: bwpd
  rp_min: 0.85
  rp_max: 80.0

joint:
  ds_file:      data/more2015_boss_cmass/logM11_12/ds_logM11_12.csv
  ds_format:    bwpd_4col
  ds_rp_min:    0.1
  ds_rp_max:    20.0
  ng_obs:       3.0e-4
  ng_frac_err:  0.20

cosmology:
  Omega_m: 0.310
  h:       0.703
  sigma8:  0.785
  n_s:     0.964
  Omega_b: 0.0451

model:
  hod_model:   MoreHODModel
  hmf_backend: tinker08
  z:           0.53
  pi_max:      100.0

parameters:
  # ── HOD parameters (5 free) ────────────────────────────────────────────────
  log10mmin:  {free: true,  bounds: [12.0, 15.0], init: 13.13}
  sigma_logm: {free: true,  bounds: [0.05, 1.50], init: 0.469}
  log10m1:    {free: true,  bounds: [13.0, 15.5], init: 14.21}
  alpha:      {free: true,  bounds: [0.50, 2.50], init: 1.13}
  kappa:      {free: true,  bounds: [0.01, 3.00], init: 1.25}

  # ── Cosmological parameters (3 free) ──────────────────────────────────────
  # Omega_m and S8 are fitted without a prior (the paper places no prior on these;
  # bounds are wide enough to encompass the data-driven posterior).
  Omega_m:
    free:        true
    bounds:      [0.15, 0.55]
    init:        0.310

  S8:
    free:        true
    bounds:      [0.55, 1.05]
    init:        0.798

  # h fitted with WMAP9-E prior (More+2015 Section 3.3)
  h:
    free:        true
    bounds:      [0.60, 0.80]
    init:        0.703
    prior_type:  gaussian
    prior_mean:  0.703
    prior_sigma: 0.018

  # ── Fixed nuisance parameters (off-centering from More+2015 Table 1) ──────
  alpha_inc:  {free: false, init: 1.0}
  log10m_inc: {free: false, init: 13.0}
  p_off:      {free: false, init: 0.34}
  R_off:      {free: false, init: 2.2}

fitting:
  method:         map
  n_walkers:      32
  n_steps:        3000
  n_burnin:       500
  use_free_cosmo: true

output:
  dir: results/benchmarks/more2015_logM11_12_freecosmo/
