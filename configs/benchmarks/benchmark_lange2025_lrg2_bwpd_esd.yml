# DESI DR1 LRG2 ESD-only (HSC-Y3) benchmark — manually digitized data (Lange+2025, arXiv:2512.15962)
# Sample: LRG2, z=0.6-0.8, z_eff=0.70, n_g=5.69e-4 h^3 Mpc^-3
# Data: ds_hsc_lrg2_bwpd.csv — manually digitized via WebPlotDigitizer from Fig 4
# ESD format: rp_hMpc, rp*DS [10^6 M_sun/pc], upper_rp*DS [10^6 M_sun/pc]; err = upper - value

ds:
  file:        data/lange2025_desi_dr1/LRG2/ds_hsc_lrg2_bwpd.csv
  ds_format:   bwpd
  rp_min:      2.5
  rp_max:      40.0
  ng_obs:      5.69e-4
  ng_frac_err: 0.10

cosmology:
  Omega_m: 0.3153
  h:       0.6736
  sigma8:  0.8111
  n_s:     0.9649
  Omega_b: 0.0493

model:
  hod_model:   Lange25HODModel
  hmf_backend: tinker08
  z:           0.70
  pi_max:      80.0

parameters:
  log10mmin:  {free: true,  bounds: [11.0, 15.0], init: 13.0}
  sigma_logm: {free: true,  bounds: [0.1,  1.0],  init: 0.4}
  log10m0:    {free: true,  bounds: [11.0, 15.0], init: 12.5}
  log10m1:    {free: true,  bounds: [11.0, 15.0], init: 13.5}
  alpha:      {free: true,  bounds: [0.5,  2.0],  init: 1.0}
  f_Gamma:    {free: true,  bounds: [0.5,  1.0],  init: 1.0}
  A_cen:      {free: true,  bounds: [-1.0, 1.0],  init: 0.0}
  A_sat:      {free: true,  bounds: [-1.0, 1.0],  init: 0.0}
  Omega_m:
    free:        true
    bounds:      [0.279, 0.352]
    init:        0.3153
    prior_type:  gaussian
    prior_mean:  0.3153
    prior_sigma: 0.0073
  S8:
    free:        true
    bounds:      [0.775, 0.889]
    init:        0.832
    prior_type:  gaussian
    prior_mean:  0.832
    prior_sigma: 0.0114

fitting:
  method:         map
  n_walkers:      64
  n_steps:        4000
  n_burnin:       1000
  use_free_cosmo: true

output:
  dir: results/benchmarks/lange2025/lrg2_bwpd_esd/
