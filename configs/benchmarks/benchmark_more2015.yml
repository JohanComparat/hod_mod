# Benchmark: More+2015 HOD fit to BOSS CMASS wp(rp)
# Paper: More et al. 2015, arXiv:1407.1011
# Data: White+2014 Table 2 (arXiv:1404.5414), z_eff=0.52
# Published best-fit: log10mmin=13.03, sigma_logm=0.38, log10m1=13.80, alpha=1.17, kappa=0.51
# Published chi2/dof ~ 0.9

data:
  file:   data/more2015_boss_cmass/wp_cmass_z052.csv
  format: csv
  rp_min: 0.50
  rp_max: 50.0

cosmology:
  Omega_m: 0.272
  h:       0.704
  sigma8:  0.810
  n_s:     0.966
  Omega_b: 0.044

model:
  hod_model:   MoreHODModel
  hmf_backend: tinker08
  z:           0.52
  pi_max:      60.0

parameters:
  log10mmin:  {free: true,  bounds: [12.0, 14.5], init: 13.03}
  sigma_logm: {free: true,  bounds: [0.05, 1.50], init: 0.38}
  log10m1:    {free: true,  bounds: [13.0, 15.5], init: 14.00}
  alpha:      {free: true,  bounds: [0.50, 2.50], init: 1.00}
  kappa:      {free: true,  bounds: [0.01, 2.00], init: 0.51}
  alpha_inc:  {free: false, init: 1.0}
  log10m_inc: {free: false, init: 13.0}

fitting:
  method:    map
  n_walkers: 32
  n_steps:   2000
  n_burnin:  500

output:
  dir: results/benchmarks/more2015_cmass/
