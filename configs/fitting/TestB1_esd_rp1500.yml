# Test B1 — ESD-only, More+2015 5-param, R > 1.5 Mpc/h (large-scale, no lensing physics)
# Baseline: can the simplest HOD describe large-scale BGS ESD?
# n_free = 5: log10mmin, sigma_logm, log10m1, alpha, kappa
# rp_min_wp set equal to rp_min_hsc for consistent directory naming
#
# python hod_mod/scripts/fitting/run_fit.py configs/fitting/TestB1_esd_rp1500.yml --map-only

description: "Test B1 — ESD-only More+2015 5-param R>1.5 Mpc/h"

data:
  mstar_lo:   10.0
  mstar_hi:   12.0
  probes:     [esd_hsc]
  rp_min_wp:  1.5          # not used for ESD-only fit; sets rp-tag in dir name
  rp_min_hsc: 1.5
  rp_max_esd: 10.0
  esd_sn_min: 5.0
  pi_max:     100.0

model:
  hod_model:           more2015
  profile:             nfw
  use_bnl:             true
  use_ia:              false
  use_offcentering:    false
  use_baryon_fraction: false
  use_stellar_mass:    false
  use_incompleteness:  false
  use_free_cosmo:      false
  use_full_cov:        false

fitting:
  method: map

output:
  base_dir: results/bgs_comparat2025
