# Test A5 — wp-only, More+2015 + off-centering + incompleteness, rp > 0.05 Mpc/h
# Push further into small scales (near fiber collision scale ~0.06 Mpc/h)
# n_free = 9: log10mmin, sigma_logm, log10m1, alpha, kappa,
#             alpha_inc, log10m_inc, f_off, sigma_off
#
# python hod_mod/scripts/fitting/run_fit.py configs/fitting/TestA5_wp_rp050_offcen_inc.yml --map-only

description: "Test A5 — wp-only More+2015 9-param rp>0.05 Mpc/h (+ offcen + incompleteness)"

data:
  mstar_lo:   10.0
  mstar_hi:   12.0
  probes:     [wp]
  rp_min_wp:  0.05
  rp_max_wp:  50.0
  pi_max:     100.0

model:
  hod_model:           more2015
  profile:             nfw
  use_bnl:             true
  use_ia:              false
  use_offcentering:    true
  use_baryon_fraction: false
  use_stellar_mass:    false
  use_incompleteness:  true
  use_free_cosmo:      false
  use_full_cov:        false

fitting:
  method: map

output:
  base_dir: results/bgs_comparat2025
