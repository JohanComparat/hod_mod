# Test A3 — wp-only, More+2015 + incompleteness, rp > 0.3 Mpc/h
# Add free incompleteness params (alpha_inc, log10m_inc) to allow BGS selection effects
# n_free = 7: log10mmin, sigma_logm, log10m1, alpha, kappa, alpha_inc, log10m_inc
#
# python hod_mod/scripts/fitting/run_fit.py configs/fitting/TestA3_wp_rp300_inc.yml --map-only

description: "Test A3 — wp-only More+2015 7-param rp>0.3 Mpc/h (+ incompleteness)"

data:
  mstar_lo:   10.0
  mstar_hi:   12.0
  probes:     [wp]
  rp_min_wp:  0.3
  rp_max_wp:  50.0
  pi_max:     100.0

model:
  hod_model:           more2015
  profile:             nfw
  use_bnl:             true
  use_ia:              false
  use_offcentering:    false
  use_baryon_fraction: false
  use_stellar_mass:    false
  use_incompleteness:  true
  use_free_cosmo:      false
  use_full_cov:        false

fitting:
  method: map

output:
  base_dir: results/bgs_comparat2025
