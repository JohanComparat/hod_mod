# Test B3 — ESD-only, More+2015 + IA + stellar mass, R > 0.5 Mpc/h
# Add stellar point-mass term (dominant at R < 0.3 Mpc/h); push to intermediate scales
# n_free = 7: log10mmin, sigma_logm, log10m1, alpha, kappa, A_IA, log10_M_star_cen
#
# python hod_mod/scripts/fitting/run_fit.py configs/fitting/TestB3_esd_rp500_ia_stellar.yml --map-only

description: "Test B3 — ESD-only More+2015 7-param R>0.5 Mpc/h (+ IA + stellar)"

data:
  mstar_lo:   10.0
  mstar_hi:   12.0
  probes:     [esd_hsc]
  rp_min_wp:  0.5          # not used for ESD-only fit; sets rp-tag in dir name
  rp_min_hsc: 0.5
  rp_max_esd: 10.0
  esd_sn_min: 5.0
  pi_max:     100.0

model:
  hod_model:           more2015
  profile:             nfw
  use_bnl:             true
  use_ia:              true
  use_offcentering:    false
  use_baryon_fraction: false
  use_stellar_mass:    true
  use_incompleteness:  false
  use_free_cosmo:      false
  use_full_cov:        false

fitting:
  method: map

output:
  base_dir: results/bgs_comparat2025
