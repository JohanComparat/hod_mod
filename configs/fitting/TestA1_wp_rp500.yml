# Test A1 — wp-only, More+2015 5-param, rp > 0.5 Mpc/h (large-scale, no physics flags)
# Baseline: can the simplest HOD describe large-scale BGS wp?
# n_free = 5: log10mmin, sigma_logm, log10m1, alpha, kappa
#
# python hod_mod/scripts/fitting/run_fit.py configs/fitting/TestA1_wp_rp500.yml --map-only

description: "Test A1 — wp-only More+2015 5-param rp>0.5 Mpc/h"

data:
  mstar_lo:   10.0
  mstar_hi:   12.0
  probes:     [wp]
  rp_min_wp:  0.5
  rp_max_wp:  50.0
  pi_max:     100.0

model:
  hod_model:           more2015
  profile:             nfw
  use_bnl:             true
  use_ia:              false
  use_offcentering:    false
  use_baryon_fraction: false
  use_stellar_mass:    false
  use_incompleteness:  false
  use_free_cosmo:      false
  use_full_cov:        false

fitting:
  method: map

output:
  base_dir: results/bgs_comparat2025
