name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy scipy astropy matplotlib h5py pandas pyyaml tqdm
          pip install pooch platformdirs
          pip install "jax[cpu]"
          pip install emcee
          pip install camb colossus
          pip install pytest pytest-cov

      - name: Install package (no-deps to skip classy/AletheiaCosmo)
        run: pip install -e . --no-deps

      - name: Run tests
        env:
          JAX_PLATFORMS: cpu
        run: |
          python -m pytest tests/ -q --tb=short \
            -k "not TestNonLinearPowerSpectrum" \
            --cov=hod_mod --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
